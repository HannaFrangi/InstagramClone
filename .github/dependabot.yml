# Dependabot version updates — options reference:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
    groups:
      # Fewer PRs: related packages bump together after one CI run
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"
      chakra-and-styling:
        patterns:
          - "@chakra-ui/*"
          - "@emotion/*"
          - "next-themes"
      vite-and-lint:
        dependency-type: development
        patterns:
          - "vite"
          - "@vitejs/*"
          - "eslint*"
          - "@eslint/*"
          - "eslint-plugin-*"
          - "globals"
      firebase:
        patterns:
          - "firebase"
      motion:
        patterns:
          - "framer-motion"
          - "motion"
      other-production:
        patterns:
          - "zustand"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(ci)
